[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  targetPort = 5201
  port = 8888

[build.environment]
  NPM_FLAGS = "--legacy-peer-deps"
  SECRETS_SCAN_OMIT_KEYS = "BGINFO_PUBLISH_SECRET"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."keypointsbank"]
  timeout = 60

[functions."upload"]
  timeout = 30

[functions."retrieve"]
  timeout = 30

[functions."map-sections"]
  timeout = 60

[functions."questionnaire"]
  timeout = 60

[functions."detect-types"]
  timeout = 60

[[redirects]]
  from = "/api/keypointsbank"
  to = "/.netlify/functions/keypointsbank"
  status = 200

[[redirects]]
  from = "/api/upload"
  to = "/.netlify/functions/upload"
  status = 200

[[redirects]]
  from = "/api/retrieve"
  to = "/.netlify/functions/retrieve"
  status = 200

[[redirects]]
  from = "/api/map-sections"
  to = "/.netlify/functions/map-sections"
  status = 200

[[redirects]]
  from = "/api/questionnaire"
  to = "/.netlify/functions/questionnaire"
  status = 200

[[redirects]]
  from = "/api/detect-types"
  to = "/.netlify/functions/detect-types"
  status = 200

[[redirects]]
  from = "/api/user-keys"
  to = "/.netlify/functions/user-keys"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
